name: Build PSP Homebrew

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pspdev/pspdev:latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up pspdev environment
        run: |
          echo "PSPDEV=/usr/local/pspdev" >> $GITHUB_ENV
          echo "PATH=/usr/local/pspdev/bin:$PATH" >> $GITHUB_ENV

      - name: Install git and ca-certificates
        run: |
          apt-get update -qq
          apt-get install -y -qq git ca-certificates

      - name: Build and install OSLib from source
        run: |
          git clone https://github.com/pspdev/oslib.git
          cd oslib
          make PSP=1
          make PSP=1 install

      - name: Download stb_vorbis
        run: |
          wget -q https://raw.githubusercontent.com/nothings/stb/master/stb_vorbis.c

      - name: Build
        run: make

      - name: Upload EBOOT.PBP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: EBOOT
          path: EBOOT.PBP
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: EBOOT.PBP
